<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muzharin Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#f5f5f5;
}

/* COVER */
.cover {
  position:fixed;
  width:100%;
  height:100vh;
  background:url('foto.png') center/cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  text-align:center;
  z-index:10;
}

.cover::after {
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
}

.cover-content {
  position:relative;
  z-index:2;
}

.cover button {
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:white;
  cursor:pointer;
}

/* HIDE */
.hidden {
  display:none;
}

/* SECTION */
.section {
  padding:40px 15px;
  max-width:500px;
  margin:auto;
  text-align:center;
}

/* CARD */
.card {
  background:white;
  padding:15px;
  border-radius:15px;
  margin-bottom:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* IMG */
img {
  width:100%;
  border-radius:12px;
}

/* ANIMASI */
.fade {
  opacity:0;
  transform:translateY(30px);
  transition:1s;
}
.fade.show {
  opacity:1;
  transform:translateY(0);
}

/* GALLERY */
.gallery {
  display:flex;
  overflow-x:auto;
  gap:15px;
  scroll-snap-type:x mandatory;
  padding:10px;
}
.gallery img {
  width:70%;
  max-width:260px;
  flex-shrink:0;
  border-radius:15px;
  scroll-snap-align:center;
  box-shadow:0 10px 20px rgba(0,0,0,0.15);
}
.dots span {
  display:inline-block;
  width:8px;
  height:8px;
  margin:3px;
  background:#ccc;
  border-radius:50%;
}
.dots span.active {
  background:#000;
}

/* FORM */
input, textarea {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  padding:10px;
  width:100%;
  border:none;
  border-radius:8px;
  background:black;
  color:white;
}

/* WISH */
.wish-item {
  background:#f9f9f9;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="love-story.mp3">
</audio>

<!-- COVER -->
<div class="cover" id="cover">
  <div class="cover-content">
    <h3 id="guest"></h3>
    <h1>Putri & Azhari</h1>
    <p>02 Mei 2026</p>
    <button onclick="openInvite()">Buka Undangan</button>
  </div>
</div>

<!-- CONTENT -->
<div id="content" style="display:none;">

<div class="section fade">
<p>
Seperti kisah dalam teori red string, Putri dan Azhari percaya bahwa sejak awal ada benang tak terlihat yang menghubungkan langkah mereka...
</p>
</div>

<div class="section fade">
<div class="card">
<img src="pria.png">
<h3>Muhamad Azhari</h3>
</div>

<div class="card">
<img src="wanita.png">
<h3>Putri Zahira Rahimah Mumtaz</h3>
</div>
</div>

<div class="section fade">
<div class="card">
<p>Akad: 09.30 WIB</p>
<p>Resepsi: 11.30 WIB</p>
</div>
</div>

<div class="section fade">
<div class="card">
<iframe src="https://www.google.com/maps?q=Bekasi&output=embed" width="100%" height="200"></iframe>
</div>
</div>

<div class="section fade">
<h3>Our Moments</h3>
<div class="gallery" id="gallery">
<img src="foto1.png">
<img src="foto2.png">
<img src="foto3.png">
</div>
<div class="dots" id="dots"></div>
</div>

<div class="section fade">
<div class="card">
<h3>RSVP</h3>
<input id="nama" placeholder="Nama">
<input id="jumlah" placeholder="Jumlah">
<input id="kota" placeholder="Kota">
<button onclick="kirim()">Kirim</button>
</div>
</div>

<div class="section fade">
<div class="card">
<h3>Make a Wish</h3>
<input id="namaWish" placeholder="Nama">
<textarea id="pesanWish"></textarea>
<button onclick="kirimWish()">Kirim</button>
<div id="listWish"></div>
</div>
</div>

</div>

<script>
// OPEN
function openInvite(){
  document.getElementById("cover").classList.add("hidden");
  document.getElementById("content").style.display="block";
  document.getElementById("music").play();
}

// NAMA TAMU
const url = new URLSearchParams(window.location.search);
const tamu = url.get("to");
if(tamu){
  document.getElementById("guest").innerText = "Kepada " + tamu;
}

// ANIMASI
window.addEventListener('scroll', ()=>{
  document.querySelectorAll('.fade').forEach(el=>{
    if(el.getBoundingClientRect().top < window.innerHeight){
      el.classList.add('show');
    }
  });
});

// GALLERY
const gallery = document.getElementById('gallery');
const images = gallery.querySelectorAll('img');
const dotsContainer = document.getElementById('dots');

let index = 0;

images.forEach((_, i)=>{
  let dot = document.createElement('span');
  if(i===0) dot.classList.add('active');
  dotsContainer.appendChild(dot);
});

const dots = dotsContainer.querySelectorAll('span');

setInterval(()=>{
  index++;
  if(index >= images.length) index = 0;

  images[index].scrollIntoView({
    behavior:'smooth',
    inline:'center'
  });

  dots.forEach(d=>d.classList.remove('active'));
  dots[index].classList.add('active');
},3000);

// RSVP
function kirim(){
  alert("Terima kasih ❤️");
}

// WISH
function kirimWish(){
  let nama = document.getElementById('namaWish').value;
  let pesan = document.getElementById('pesanWish').value;

  let waktu = new Date().toLocaleTimeString();

  let html = `
    <div class="wish-item">
      <b>${nama}</b><br>
      <small>${waktu}</small>
      <p>${pesan}</p>
    </div>
  `;

  document.getElementById('listWish').innerHTML += html;
}
</script>

</body>
</html>
