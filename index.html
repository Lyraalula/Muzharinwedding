<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muzharin Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(to bottom,#fff,#f5f5f5);
}
*{box-sizing:border-box;}
html,body{overflow-x:hidden;}

h1{font-size:clamp(26px,5vw,42px);}
h2{font-size:clamp(22px,4vw,32px);}
h3{font-size:clamp(18px,3.5vw,24px);}
p{font-size:clamp(14px,3vw,16px);}


/* ================= COVER ================= */
.cover{
  position:fixed;
  width:100%;
  height:100vh;
  background:url('foto.png') center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
  z-index:10;
}

.cover::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  top:0;left:0;
}

.cover-content{
  position:relative;
  z-index:2;
  padding:30px;
  border-radius:20px;
  backdrop-filter:blur(8px);
}

.btn-open{
  margin-top:20px;
  padding:14px 30px;
  border-radius:30px;
  background:#fff;
  cursor:pointer;
}


/* ================= OPENING ================= */
.opening{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url('bg1.png') center/cover no-repeat;
  color:#fff;
  position:relative;
}

.opening::before{
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.opening-text{
  position:relative;
  opacity:0;
  transform:translateY(30px);
  transition:1s;
}
.opening-text.show{
  opacity:1;
  transform:translateY(0);
}


/* ================= SECTION ================= */
.section{
  padding:60px 15px;
  text-align:center;
  border-radius:20px;
  margin-bottom:25px;
}

.section.clean{
  background:#fff;
  color:#333;
}

.section.bg{
  background:url('bg2.png') center/cover no-repeat;
  color:#fff;
  position:relative;
}
.section.bg::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
  top:0;
}
.section.bg *{position:relative;z-index:2;}


/* ================= CARD ================= */
.card{
  background:#fff;
  padding:15px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}


/* ================= ACARA ================= */
.event-row{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
}

.event-card{
  background:#fff;
  color:#000;
  padding:20px;
  border-radius:20px;
  width:220px;
}


/* ================= MAP ================= */
.map-card{
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,0.2);
  transform:scale(0.9);
  opacity:0;
  transition:1s;
}

.map-card.show{
  transform:scale(1);
  opacity:1;
}


/* ================= STORY ================= */
.story{
  position:relative;
  padding-top:40px;
}

.story::before{
  content:'';
  position:absolute;
  left:50%;
  top:0;
  width:2px;
  height:100%;
  background:#ff4d6d;
}

.story-item{
  width:45%;
  background:#fff;
  padding:20px;
  border-radius:15px;
  margin-bottom:40px;
}

.story-item:nth-child(even){
  margin-left:auto;
}

@media(max-width:768px){
  .story::before{left:20px;}
  .story-item{
    width:100%;
    margin-left:30px !important;
  }
}


/* ================= GALERI ================= */
.gallery{
  display:flex;
  overflow-x:auto;
  gap:15px;
}
.gallery img{
  width:80%;
  border-radius:15px;
}


/* ================= RSVP & WISH ================= */
.clickable-card a{
  display:block;
}
.clickable-card img{
  cursor:pointer;
  transition:0.3s;
}
.clickable-card img:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<!-- ================= COVER ================= -->
<div class="cover" id="cover">
  <div class="cover-content">
    <h1>Putri & Azhari</h1>
    <button onclick="openInvite()" class="btn-open">Buka Undangan</button>
  </div>
</div>

<!-- ================= OPENING ================= -->
<div class="opening hidden" id="opening">
  <div class="opening-text" id="openingText">
    <p>Red string story...</p>
  </div>
</div>

<!-- ================= CONTENT ================= -->
<div id="content" style="display:none;">

  <!-- MEMPELAI -->
  <div class="section clean">
    <div class="card">Pria</div>
    <div class="card">Wanita</div>
  </div>

  <!-- ACARA -->
  <div class="section bg">
    <h2>Acara</h2>
    <div class="event-row">
      <div class="event-card">Akad</div>
      <div class="event-card">Resepsi</div>
    </div>
  </div>

  <!-- MAP -->
  <div class="section clean">
    <div class="card map-card" id="map">
      <iframe src="https://www.google.com/maps?q=Bekasi&output=embed"></iframe>
    </div>
  </div>

  <!-- STORY -->
  <div class="section clean">
    <h2>Redstring Story</h2>
    <div class="story">
      <div class="story-item">Pendekatan</div>
      <div class="story-item">Kedekatan</div>
      <div class="story-item">Menikah</div>
    </div>
  </div>

  <!-- GALERI -->
  <div class="section bg">
    <div class="gallery">
      <img src="1.png">
      <img src="2.png">
    </div>
  </div>

  <!-- RSVP -->
  <div class="section clean">
    <div class="card clickable-card">
      <a href="LINK">
        <img src="rsvp.png">
      </a>
    </div>
  </div>

  <!-- WISH -->
  <div class="section clean">
    <div class="card clickable-card">
      <a href="LINK">
        <img src="wish.png">
      </a>
    </div>
  </div>
</div>
  
<script>
  /* ================= OPENING ================= */
function openInvite(){
  document.getElementById("cover").style.display="none";

  const opening = document.getElementById("opening");
  const content = document.getElementById("content");

  opening.classList.remove("hidden");

  setTimeout(()=>{
    opening.style.display="none";
    content.style.display="block";
  },4000);
}

/* ================= MAP ANIMATION ================= */
window.addEventListener("scroll",()=>{
  const map = document.getElementById("map");

  if(map.getBoundingClientRect().top < window.innerHeight - 100){
    map.classList.add("show");
  }
});
</script>
</body>
</html>
