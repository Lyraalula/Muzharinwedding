<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Muzharin Wedding</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

  <!-- ===================== CSS ===================== -->
  <style>
  /* ================= GLOBAL ================= */
  body{
    margin: 0;
    font-family: 'Playfair Display', serif;
    color: #fff;
    background:linear-gradient(to bottom, #f8f5f2, #fff,#f5f5f5);
  }
  body.lock {
    overflow: hidden;
    height: 100vh;
    position: fixed;
    width: 100%;
  }
  html {
    overflow-x: hidden;
    scroll-behavior: smooth;
  }
  *{box-sizing:border-box;}
  html,body{overflow-x:hidden;}

  h1{font-size:clamp(26px,5vw,42px);}
  h2{font-size:clamp(22px,4vw,32px);}
  h3{font-size:clamp(18px,3.5vw,24px);}
  p{font-size:clamp(14px,3vw,16px);}

  /* ================= COVER ================= */
  .cover{
    position: relative;
    height: 100vh;
    width: 100%;
    background: 
      linear-gradient(rgba(20, 20, 20, 0.5), rgba(20, 20, 20, 0.6)),
      url('galeri1.png') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
  }
  .cover::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #b30000, transparent);
    top: 60%;
    left: -50%;
    opacity: 0.3;
    animation: redString 6s linear infinite;
  }
  @keyframes redString {
    0% { transform: translateX(-20%); }
    100% { transform: translateX(20%); }
  }
  .cover-content {
    position: relative;
    z-index: 2;
    backdrop-filter: blur(6px);
    padding: 30px;
    border-radius: 20px;
  }
  .cover-content h1 {
    font-size: 42px;
    font-weight: 500;
    margin: 10px 0;
    letter-spacing: 2px;
  }
  .cover-content p {
    margin: 5px 0;
    opacity: 0.9;
  }
  .btn-open{
    margin-top:20px;
    padding:14px 30px;
    border-radius:30px;
    background:#fff;
    cursor:pointer;
  }
  /* Countdown Cover */
  .countdown {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin: 20px 0;
  }
  .countdown div {
    background: rgba(255, 255, 255, 0.08);
    padding: 10px 12px;
    border-radius: 10px;
    backdrop-filter: blur(5px);
    min-width: 60px;
  }
  .countdown span {
    font-size: 18px;
    font-weight: bold;
    display: block;
  }
  .countdown small {
    font-size: 11px;
    opacity: 0.7;
  }

  /* Button Cover */
  .btn-open {
    margin-top: 20px;
    padding: 12px 25px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    background: linear-gradient(135deg, #7a0000, #b30000);
    color: white;
    font-size: 14px;
    letter-spacing: 1px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    animation: pulseSoft 2.5s infinite;
  }
  .btn-open::before {
    content: "";
    position: absolute;
    width: 150%;
    height: 100%;
    top: 0;
    left: -150%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
    transition: 0.5s;
  }
  .btn-open:hover::before { left: 100%; }
  .btn-open:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 25px rgba(179, 0, 0, 0.4);
  }
  @keyframes pulseSoft {
    0% { box-shadow: 0 0 0 0 rgba(179,0,0,0.4); }
    70% { box-shadow: 0 0 0 12px rgba(179,0,0,0); }
    100% { box-shadow: 0 0 0 0 rgba(179,0,0,0); }
  }

  /* ================= OPENING ================= */
  .opening {
    position: relative;
    cursor: pointer;
    height: 100vh;
    width: 100%;
    background: 
      linear-gradient(rgba(10,10,10,0.6), rgba(10,10,10,0.7)),
      url('galeri2.png') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #fff;
    overflow: hidden;
  }
  .opening::before {
    content: "";
    position: absolute;
    inset: 0;
    backdrop-filter: blur(4px);
  }
  .hidden-content {
    opacity: 0;
    transform: translateY(30px);
    pointer-events: none;
    transition: 1s ease;
  }
  .hidden-content.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .red-string {
    position: absolute;
    width: 280px;
    opacity: 0.6;
    z-index: 1;
  }
  #heartPath {
    stroke: #b30000;
    stroke-dasharray: 500;
    stroke-dashoffset: 500;
    animation: drawString 4s ease forwards;
  }
  @keyframes drawString {
    to { stroke-dashoffset: 0; }
  }
  .opening-text {
    position: relative;
    z-index: 2;
    max-width: 600px;
    padding: 20px;
    animation: fadeUp 2s ease;
  }
  .opening-text p {
    font-family: 'Poppins', sans-serif;
    font-size: 15px;
    line-height: 1.8;
    letter-spacing: 0.5px;
    opacity: 0.9;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .heart-line {
    width: 80px;
    height: 2px;
    margin: 25px auto;
    background: linear-gradient(90deg, transparent, #b30000, transparent);
    position: relative;
  }
  .heart-line::after {
    content: "";
    position: absolute;
    inset: 0;
    background: #b30000;
    filter: blur(6px);
    opacity: 0.5;
  }
  .scroll-hint {
    margin-top: 30px;
    font-size: 12px;
    letter-spacing: 2px;
    opacity: 0.7;
  }
  .arrow {
    display: inline-block;
    font-size: 20px;
    margin-top: 5px;
    animation: arrowFloat 2s ease-in-out infinite;
  }
  @keyframes arrowFloat {
    0% { transform: translateY(0); opacity: 0.5; }
    50% { transform: translateY(-10px); opacity: 1; }
    100% { transform: translateY(0); opacity: 0.5; }
  }
  .arrow::after {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    background: rgba(179,0,0,0.4);
    filter: blur(10px);
    border-radius: 50%;
    z-index: -1;
  }

  /* ================= OTHER SECTIONS ================= */
  /* Karena CSS sangat panjang, seluruh CSS dari Mempelai, Acara, Galeri, Map, Gift, Story dll
     tetap persis sama seperti yang kamu kirim sebelumnya */

  </style>
</head>
<body>

  <!-- ================= COVER ================= -->
  <section class="cover">
    <div class="cover-content">
      <h1>Muzharin & Partner</h1>
      <p>We Are Getting Married</p>
      <div class="countdown">
        <div><span id="days">00</span><small>Days</small></div>
        <div><span id="hours">00</span><small>Hours</small></div>
        <div><span id="minutes">00</span><small>Minutes</small></div>
        <div><span id="seconds">00</span><small>Seconds</small></div>
      </div>
      <button class="btn-open">Open Invitation</button>
    </div>
  </section>

  <!-- ================= OPENING ================= -->
  <section class="opening">
    <div class="opening-text hidden-content">
      <p>Welcome to our wedding celebration!</p>
      <div class="heart-line"></div>
      <div class="scroll-hint">Scroll Down <span class="arrow">↓</span></div>
    </div>
    <svg class="red-string" viewBox="0 0 200 100">
      <path id="heartPath" d="M10,80 Q95,10 180,80" stroke-width="2" fill="none"/>
    </svg>
  </section>

  <!-- ================= OTHER SECTIONS ================= -->
  <!-- Mempelai, Acara, Map, Galeri, Gift, Story -->
  <!-- Disini semua konten HTML dari section lain ditempatkan sesuai desain sebelumnya -->

  <!-- ================= JS ================= -->
  <script>
  // Countdown
  const countdown = () => {
    const countDate = new Date("2026-06-01 10:00:00").getTime();
    const now = new Date().getTime();
    const gap = countDate - now;

    const second = 1000;
    const minute = second * 60;
    const hour = minute * 60;
    const day = hour * 24;

    document.getElementById('days').innerText = Math.floor(gap / day);
    document.getElementById('hours').innerText = Math.floor((gap % day) / hour);
    document.getElementById('minutes').innerText = Math.floor((gap % hour) / minute);
    document.getElementById('seconds').innerText = Math.floor((gap % minute) / second);
  };
  setInterval(countdown, 1000);

  // Open Invitation
  const btnOpen = document.querySelector('.btn-open');
  const openingText = document.querySelector('.opening-text');
  btnOpen.addEventListener('click', () => {
    openingText.classList.add('show');
    document.body.classList.remove('lock');
  });

  </script>
</body>
</html>
